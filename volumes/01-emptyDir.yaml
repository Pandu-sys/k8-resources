apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
  - image: nginx
    name: nginx
    volumeMounts:
    - mountPath: /var/logs/nginx
      name: nginx-logs
  - image: almalinux:9
    name: almalinux
    command: ["sleep", "1000"]
    volumeMounts:
    - mountPath: /mnt/nginx-logs
      name: nginx-logs
  volumes:
  - name: nginx-logs
    # this created emptyDir in the node where pod scheduled
    emptyDir:
      sizeLimit: 500Mi
